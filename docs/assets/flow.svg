<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="Fluxo arquitetural">
  <defs>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B6FB8"/>
      <stop offset="100%" stop-color="#F26B3A"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>

  <style>
    .lbl { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif; font-size: 12px; fill: #0A2540; font-weight: 600; }
    .sub { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif; font-size: 10px; fill: #4B6A85; }
    .box { fill: #FFFFFF; stroke: #0A2540; stroke-width: 1.5; }
    .accent { fill: #FFF6E0; stroke: #F26B3A; stroke-width: 1.5; }
  </style>

  <rect x="0" y="0" width="1200" height="260" fill="#FAFBFC"/>

  <g>
    <rect class="box" x="30" y="100" width="130" height="60" rx="10"/>
    <text class="lbl" x="95" y="128" text-anchor="middle">ACS no campo</text>
    <text class="sub" x="95" y="146" text-anchor="middle">WhatsApp</text>
  </g>

  <g>
    <rect class="box" x="200" y="100" width="130" height="60" rx="10"/>
    <text class="lbl" x="265" y="128" text-anchor="middle">Twilio Sandbox</text>
    <text class="sub" x="265" y="146" text-anchor="middle">→ ngrok webhook</text>
  </g>

  <g>
    <rect class="box" x="370" y="100" width="160" height="60" rx="10"/>
    <text class="lbl" x="450" y="128" text-anchor="middle">Backend Hono</text>
    <text class="sub" x="450" y="146" text-anchor="middle">Node 20 · TypeScript</text>
  </g>

  <g>
    <rect class="accent" x="570" y="30" width="180" height="60" rx="10"/>
    <text class="lbl" x="660" y="58" text-anchor="middle">Claude Haiku 4.5</text>
    <text class="sub" x="660" y="76" text-anchor="middle">extração estruturada</text>
  </g>

  <g>
    <rect class="accent" x="570" y="170" width="180" height="60" rx="10"/>
    <text class="lbl" x="660" y="198" text-anchor="middle">Claude Sonnet 4.6</text>
    <text class="sub" x="660" y="216" text-anchor="middle">chat · tool use (4 tools)</text>
  </g>

  <g>
    <rect class="box" x="790" y="100" width="150" height="60" rx="10"/>
    <text class="lbl" x="865" y="128" text-anchor="middle">Supabase Postgres</text>
    <text class="sub" x="865" y="146" text-anchor="middle">score recompute</text>
  </g>

  <g>
    <rect class="box" x="980" y="100" width="190" height="60" rx="10"/>
    <text class="lbl" x="1075" y="124" text-anchor="middle">Dashboard Next.js 16</text>
    <text class="sub" x="1075" y="140" text-anchor="middle">Leaflet · heatmap</text>
    <text class="sub" x="1075" y="154" text-anchor="middle">ORS isochrones</text>
  </g>

  <g stroke="url(#wire)" stroke-width="2" fill="none" filter="url(#soft)">
    <path d="M160 130 H200" />
    <path d="M330 130 H370" />
    <path d="M530 130 H790" />
    <path d="M940 130 H980" />
    <path d="M490 100 V90 Q490 60 570 60" />
    <path d="M490 160 V170 Q490 200 570 200" />
    <path d="M750 60 Q830 60 830 100" />
    <path d="M750 200 Q830 200 830 160" />
  </g>

  <g fill="#F26B3A">
    <circle r="3.5">
      <animateMotion dur="5s" repeatCount="indefinite" path="M30 130 L990 130"/>
    </circle>
  </g>
</svg>
