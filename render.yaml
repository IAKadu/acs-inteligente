services:
  - type: web
    name: impact-acs-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: src/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3001
      # Secrets — preencher no dashboard do Render após deploy
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false   # ex: https://impact-acs-rio.vercel.app
